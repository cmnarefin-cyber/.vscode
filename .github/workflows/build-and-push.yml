name: Build and publish Docker image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy nested app files to repo root (if present)
        run: |
          if [ -d .vscode ]; then
            cp -a .vscode/. .
          fi

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Use a sanitized, descriptive image name (repo name may start with a dot)
          tags: |
            ghcr.io/${{ github.repository_owner }}/cmnarefin-cyber-vscode:latest
            ghcr.io/${{ github.repository_owner }}/cmnarefin-cyber-vscode:${{ github.sha }}
