name: Deploy to Azure App Service (optional)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    if: secrets.AZURE_WEBAPP_PUBLISH_PROFILE != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: webapp:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'webapp:latest'

# Note: To use this workflow set these repository secrets: AZURE_WEBAPP_PUBLISH_PROFILE and AZURE_APP_NAME
